<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Groupe - Accueil</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        .logo-container img {
            max-width: 140px;
            height: auto;
            margin-bottom: 1.5rem;
        }
        h1 {
            color: #2c3e50;
            font-size: 1.6rem;
            margin-bottom: 2rem;
        }
        nav {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }
        .btn {
            text-decoration: none;
            color: white;
            background-color: #2c3e50;
            padding: 14px 20px;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-weight: 500;
            display: block;
        }
        .btn:hover {
            background-color: #34495e;
            transform: translateY(-2px);
        }
        .btn-rider {
            background-color: #e67e22;
        }
        .btn-rider:hover {
            background-color: #d35400;
        }
        hr {
            width: 100%;
            border: 0;
            border-top: 1px solid #eee;
            margin: 10px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="logo.png" alt="Logo" onerror="this.src='https://via.placeholder.com/150/2c3e50/ffffff?text=ROSIE'">
    </div>

    <h1>Tableau de bord</h1>

    <nav>
        <a href="https://pambajam.github.io/DEVIS-DR/index.html" class="btn">Générer un Devis</a>
        <a href="https://pambajam.github.io/FACTURE-DR/index.html" class="btn">Générer une Facture</a>
        
        <hr>
        
        <a href="dirty-rosie.pdf" target="_blank" class="btn btn-rider">Consulter le Rider</a>
    </nav>
</div>

</body>
</html>
